name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build-test-install:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cmake --build build --parallel
      - name: Test
        run: ctest --test-dir build --output-on-failure
      - name: Install
        run: cmake --install build --prefix "$RUNNER_TEMP/pkmn-install"
      - name: Installed CLI smoke test
        run: |
          "$RUNNER_TEMP/pkmn-install/bin/pkmn" --help
          "$RUNNER_TEMP/pkmn-install/bin/pkmn" --version
          "$RUNNER_TEMP/pkmn-install/bin/pkmn" doctor
