name: Homebrew head formula

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "CMakeLists.txt"
      - "src/**"
      - "resources/**"
      - "docs/**"
      - "packaging/homebrew/**"
      - ".github/workflows/homebrew.yml"

permissions:
  contents: read

jobs:
  install-test:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Formula style
        run: brew style packaging/homebrew/pkmn-cli.rb
      - name: Install from public HEAD
        run: brew install --HEAD --build-from-source ./packaging/homebrew/pkmn-cli.rb
      - name: Formula test
        run: brew test pkmn-cli
      - name: Installed deep smoke test
        run: |
          pkmn --version
          pkmn doctor --deep
